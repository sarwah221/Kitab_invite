<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1008 url('background3.jpg') center center / cover no-repeat fixed;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(20, 10, 6, 0.10);
      pointer-events: none;
      z-index: 0;
    }

    .monogram {
      position: fixed;
      top: 44%;
      left: 48%;
      transform: translate(-50%, -250px);
      z-index: 2;
      pointer-events: none;
      font-family: 'Great Vibes', cursive;
      font-size: 30px;
      letter-spacing: 0.08em;
      color: #8f966d;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.18);
      user-select: none;
      font-weight: 590;
      display: flex;
      align-items: baseline;
      gap: 0.1em;
      white-space: nowrap;
    }

    .letter-ampersand-top {
      display: inline-block;
      width: 1.5px;
      height: 1.2em;
      background: #8f966d;
      opacity: 0.75;
      margin: 0 0.3em;
      transform: translateY(0.2em);
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.8), rgba(212,175,55,0));
      animation: drift linear infinite;
    }

    @keyframes drift {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .scene {
      position: relative;
      width: 350px;
      z-index: 10;
      cursor: pointer;
      perspective: 1200px;
      transform: translateY(100px);
      animation: envelope-float 3.2s ease-in-out infinite;
      will-change: transform;
    }

    .scene.open,
    .scene.closing {
      animation-play-state: paused;
    }

    @keyframes envelope-float {
      0%,
      100% {
        transform: translateY(100px);
      }
      50% {
        transform: translateY(92px);
      }
    }

    .envelope-wrap {
      position: relative;
      width: 400px;
      height: 230px;
      bottom: -20px;
      right: 6%;
    }

    .envelope-body {
      position: absolute;
      inset: 0;
      z-index: 3;
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(160deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
      border-radius: 0px 0px 0px 0px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.5),
        0 4px 15px rgba(0,0,0,0.2);
      
    }

    .flap-front,
    .flap-back {
      background-blend-mode: soft-light;
    }

    .envelope-body::before {
      content: none;
    }

    .envelope-body::after {
      content: none;
    }

    .fold-left, .fold-right {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }
    .fold-left {
      left: 0;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(170deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
      filter: drop-shadow(1px 0 0 rgba(120, 95, 70, 0.2));
    }
    .fold-right {
      right: 0;
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(190deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
      filter: drop-shadow(-1px 0 0 rgba(120, 95, 70, 0.2));
    }

    .fold-left::after,
    .fold-right::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .fold-left::after {
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      background:
        linear-gradient(135deg, transparent 48.8%, rgba(120, 95, 70, 0.26) 50%, transparent 51.2%),
        linear-gradient(225deg, transparent 48.8%, rgba(255, 255, 255, 0.38) 50%, transparent 51.2%);
    }

    .fold-right::after {
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
      background:
        linear-gradient(45deg, transparent 48.8%, rgba(120, 95, 70, 0.26) 50%, transparent 51.2%),
        linear-gradient(315deg, transparent 48.8%, rgba(255, 255, 255, 0.38) 50%, transparent 51.2%);
    }

    .fold-overlay {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      pointer-events: none;
      z-index: 9;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .fold-overlay-left {
      left: 0;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(170deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
      filter: drop-shadow(1px 0 0 rgba(120, 95, 70, 0.25));
    }

    .fold-overlay-right {
      right: 0;
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(190deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
      filter: drop-shadow(-1px 0 0 rgba(120, 95, 70, 0.25));
    }

    .fold-overlay-bottom {
      left: 0;
      bottom: 0;
      width: 100%;
      height: 56%;
      transform: translateY(98px);
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(180deg, #f8f1e3 0%, #ede2cf 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
      filter: drop-shadow(0 -1px 0 rgba(120, 95, 70, 0.24));
    }

    .fold-overlay::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .fold-overlay-left::after {
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      background:
        linear-gradient(135deg, transparent 48.8%, rgba(120, 95, 70, 0.22) 50%, transparent 51.2%),
        linear-gradient(225deg, transparent 48.8%, rgba(255, 255, 255, 0.32) 50%, transparent 51.2%);
    }

    .fold-overlay-right::after {
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
      background:
        linear-gradient(45deg, transparent 48.8%, rgba(120, 95, 70, 0.22) 50%, transparent 51.2%),
        linear-gradient(315deg, transparent 48.8%, rgba(255, 255, 255, 0.32) 50%, transparent 51.2%);
    }

    .fold-overlay-bottom::after {
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
      background:
        linear-gradient(180deg, rgba(120, 95, 70, 0.22), rgba(255, 255, 255, 0.2));
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80%;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 1.1s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 4;
      will-change: transform;
    }

    .flap-front, .flap-back {
      position: absolute;
      inset: 0;
      clip-path: polygon(0 0, 100% 0, 100% 20%, 50% 100%, 0 20%);
      backface-visibility: hidden;
    }

    .flap-front {
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(170deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
    }

    .flap-back {
      clip-path: polygon(0 100%, 100% 100%, 100% 80%, 50% 0, 0 80%);
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(170deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
      transform: rotateX(180deg);
    }

    .flap-front::after {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(
        0 0, 100% 0, 100% 20%, 50% 100%, calc(50% - 1.5px) calc(100% - 2.5px), 1.5px 20.5%, 0 20%
      );
      background: linear-gradient(160deg, rgba(160,140,110,0.22), rgba(255,255,255,0.08));
    }

    .flap-outline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80%;
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .flap-outline::before {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(0 0, 100% 0, 100% 20%, 50% 100%, 0 20%);
      border: 2px solid rgba(128, 115, 102, 0.55);
      box-shadow:
        inset 0 0 0 1px rgba(229, 202, 202, 0.35),
        0 1px 3px rgba(78, 66, 66, 0.2);
      background: rgba(108, 81, 19, 0.08);
    }

    .wax {
      position: absolute;
      top: 75%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 140px;
      z-index: 5;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .wax-img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }

    .hint {
      position: absolute;
      bottom: 220px;
      width: 100%;
      text-align: center;
      font-size: 16px;
      font-weight: 1000;    
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8f966d;
      transition: opacity 0.5s;
      z-index: 20;
    }
    .scene.open .hint { opacity: 0; pointer-events: none; }

    /*LETTER*/
    .letter {
      position: absolute;
      bottom: 20px;
      left: 5%;
      width: 90%;
      height: 490px;
      z-index: 2;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      background: #fffcf5;
      border-radius: 3px;
      overflow: hidden;
      transition:
        box-shadow 0.9s ease,
        opacity 0.25s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 27px, rgba(180,150,100,0.08) 28px
      );
      transform-origin: bottom center;
      transform: translateY(0) scaleY(0.42);
      will-change: transform, bottom;
    }

    .letter-inner {
      padding: 28px 24px 24px;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      position: relative;
    }

    .letter-inner::before,
    .letter-inner::after {
      content: "✦";
      position: absolute;
      font-size: 10px;
      color: rgba(180,140,60,0.4);
    }
    .letter-inner::before { top: 12px; left: 12px; }
    .letter-inner::after  { top: 12px; right: 12px; }

    .letter-divider {
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,140,60,0.4), transparent);
      margin: 8px auto;
    }

    .letter-eyebrow {
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: none;
      color: rgba(140,100,60,0.7);
      font-weight: 300;
    }

    .letter-names {
      font-family: 'Amiri', serif;
      font-size: 50px;
      color: #8f966d;
      line-height: 1.1;
      margin: 2px 0;
      text-shadow: 0 2px 8px rgba(100,20,40,0.15);
    }

    .letter-ampersand {
      font-family: 'Amiri', serif;
      font-style: italic;
      font-size: 26px;
      color: rgba(180,140,60,0.7);
      display: block;
      margin: -2px 0 8px;
    }


    .letter-body {
      font-size: 16px;
      line-height: 1.7;
      color: #5a3e2e;
      font-weight: 300;
      margin-top: 6px;
    }

    .letter-detail {
      margin-top: 12px;
      font-size: 12px;
      letter-spacing: 1px;
      line-height: 2;
      color: #4a3020;
    }

    .letter-detail strong {
      font-weight: 400;
      color: #6a1828;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 10px;
    }

    .letter-footer {
      margin-top: 12px;
      font-family: 'Amiri', serif;
      font-style: italic;
      font-size: 12px;
      color: rgba(140,100,60,0.7);
    }

    /*  OPEN STATE  */
    .scene.open .flap {
      transform: rotateX(-180deg);
      z-index: 0;
    }

    .scene.open .flap-outline {
      opacity: 1;
    }

    .scene.open .fold-overlay,
    .scene.closing .fold-overlay {
      opacity: 1;
    }

    /* On close, wait for the letter to slide down before shutting the flap. */
    .scene.closing .flap {
      z-index: 11;
      transition-delay: 0.5s;
    }

    .scene:not(.open):not(.closing) .flap {
      z-index: 5;
    }

    .scene.open .wax {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.8);
    }

    .scene.open .letter {
      opacity: 1;
      visibility: visible;
      animation: letter-rise-unfold 1.35s cubic-bezier(0.22, 0.75, 0.2, 1) 0.9s forwards;
      box-shadow:
        0 30px 80px rgba(0,0,0,0.8),
        0 10px 30px rgba(0,0,0,0.5);
      z-index: 10;
    }

    /* Keep open animation delayed, but let close start immediately. */
    .scene.closing .letter {
      opacity: 1;
      visibility: visible;
      z-index: 10;
    }

    .scene:not(.open):not(.closing) .letter {
      z-index: 2;
      animation: none;
      transform: translateY(0) scaleY(0.42);
      bottom: 30px;
      opacity: 0;
      visibility: hidden;
    }

    .scene.open .letter-inner {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 1.85s;
    }

    .scene.closing .letter-inner {
      opacity: 0;
      transform: translateY(10px);
      transition-delay: 0s;
    }

    @keyframes letter-rise-unfold {
      0% {
        bottom: 30px;
        transform: translateY(0) scaleY(0.42);
      }
      46% {
        bottom: 72px;
        transform: translateY(0) scaleY(0.42);
      }
      100% {
        bottom: 20px;
        transform: translateY(0) scaleY(1);
      }
    }

    @keyframes letter-fold-return {
      0% {
        bottom: 30px;
        transform: translateY(0) scaleY(1);
      }
      55% {
        bottom: 72px;
        transform: translateY(0) scaleY(0.42);
      }
      100% {
        bottom: 30px;
        transform: translateY(0) scaleY(0.42);
      }
    }
  </style>
</head>
<body>

<div class="monogram" aria-hidden="true"><span>S</span><span class="letter-ampersand-top" aria-hidden="true"></span><span>Z</span></div>

<div class="particles" id="particles"></div>

<div class="scene" id="scene" onclick="toggle()">
  <div class="envelope-wrap">
    <div class="envelope-body">
      <div class="fold-left"></div>
      <div class="fold-right"></div>
    </div>

    <div class="flap">
      <div class="flap-front"></div>
      <div class="flap-back"></div>
    </div>

    <div class="flap-outline" aria-hidden="true"></div>

    <div class="wax">
      <img class="wax-img" src="wax2.png" alt="Wax seal">
    </div>

  <div class="letter" dir="rtl" lang="ar">
  <div class="letter-inner">
    <div class="letter-eyebrow">يتشرف بشار وتار بدعوتكم لحضور عقد قران ابنته سارة على السيد زيد</div>
    <div class="letter-divider"></div>
    <div class="letter-names">
      سارة
      <span class="letter-ampersand">و</span>
      زيد
    </div>
    <div class="letter-divider"></div>
    <p class="letter-body">
      يدعوانكم بكل سرور لمشاركتهما<br>
      بداية حياتهما معًا
    </p>
    <div class="letter-detail">
      <strong>التاريخ</strong><br>
      يوم الثلاثاء ايار 5 2026 <br><br>
      <strong>المكان</strong><br>
      Goda Rum, Kumlas Naturenshus, السويد
    </div>
    <div class="letter-divider" style="margin-top:12px;"></div>
    <div class="letter-footer">عشاء</div>
  </div>
</div>

    <div class="fold-overlay fold-overlay-left" aria-hidden="true"></div>
    <div class="fold-overlay fold-overlay-right" aria-hidden="true"></div>
    <div class="fold-overlay fold-overlay-bottom" aria-hidden="true"></div>
  </div>

  <div class="hint">— tap to open —</div>
</div>

<script>
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 14 + 10}s;
      animation-delay: ${Math.random() * -20}s;
      opacity: ${Math.random() * 0.6 + 0.2};
    `;
    container.appendChild(p);
  }

  const scene = document.getElementById('scene');
  const OPEN_SETTLE_MS = 2500;
  const CLOSE_SETTLE_MS = 2200;
  let closeCleanupTimer;
  let transitionLock = false;

  function toggle() {
    if (transitionLock) return;

    if (scene.classList.contains('open')) {
      transitionLock = true;
      scene.classList.add('closing');
      scene.classList.remove('open');

      clearTimeout(closeCleanupTimer);
      closeCleanupTimer = setTimeout(() => {
        scene.classList.remove('closing');
        transitionLock = false;
      }, CLOSE_SETTLE_MS);
      return;
    }

    transitionLock = true;
    clearTimeout(closeCleanupTimer);
    scene.classList.remove('closing');
    scene.classList.add('open');

    setTimeout(() => {
      transitionLock = false;
    }, OPEN_SETTLE_MS);
  }
</script>
</body>
</html>
