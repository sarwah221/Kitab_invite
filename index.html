<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1008 url('background1.jpg') center center / cover no-repeat;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(20, 10, 6, 0.10);
      pointer-events: none;
      z-index: 0;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.8), rgba(212,175,55,0));
      animation: drift linear infinite;
    }

    @keyframes drift {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .scene {
      position: relative;
      width: 340px;
      z-index: 10;
      cursor: pointer;
      perspective: 1200px;
      transform: translateY(100px);
    }

    .envelope-wrap {
      position: relative;
      width: 100%;
      height: 220px;
    }

    .envelope-body {
      position: absolute;
      inset: 0;
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(160deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
      border-radius: 6px 6px 8px 8px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.7),
        0 4px 15px rgba(0,0,0,0.4);
    }

    .flap-front,
    .flap-back {
      background-blend-mode: soft-light;
    }

    .envelope-body::before {
      content: none;
    }

    .envelope-body::after {
      content: none;
    }

    .fold-left, .fold-right {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }
    .fold-left  {
      left: 0;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(170deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
      filter: drop-shadow(1px 0 0 rgba(120, 95, 70, 0.2));
    }
    .fold-right {
      right: 0;
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(190deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
      filter: drop-shadow(-1px 0 0 rgba(120, 95, 70, 0.2));
    }

    .fold-left::after,
    .fold-right::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .fold-left::after {
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      background:
        linear-gradient(135deg, transparent 48.8%, rgba(120, 95, 70, 0.26) 50%, transparent 51.2%),
        linear-gradient(225deg, transparent 48.8%, rgba(255, 255, 255, 0.38) 50%, transparent 51.2%);
    }

    .fold-right::after {
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
      background:
        linear-gradient(45deg, transparent 48.8%, rgba(120, 95, 70, 0.26) 50%, transparent 51.2%),
        linear-gradient(315deg, transparent 48.8%, rgba(255, 255, 255, 0.38) 50%, transparent 51.2%);
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80%;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 1.1s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 4;
    }

    .flap-front, .flap-back {
      position: absolute;
      inset: 0;
      clip-path: polygon(0 0, 100% 0, 100% 20%, 50% 100%, 0 20%);
      backface-visibility: hidden;
    }

    .flap-front {
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(170deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
    }

    .flap-back {
      clip-path: polygon(0 100%, 100% 100%, 100% 80%, 50% 0, 0 80%);
      background:
        url('https://www.transparenttextures.com/patterns/rice-paper-2.png'),
        linear-gradient(170deg, #fffdf8 0%, #f7f2e8 100%);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-blend-mode: multiply, normal;
      transform: rotateX(180deg);
    }

    .flap-front::after {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(
        0 0, 100% 0, 100% 20%, 50% 100%, calc(50% - 1.5px) calc(100% - 2.5px), 1.5px 20.5%, 0 20%
      );
      background: linear-gradient(160deg, rgba(160,140,110,0.22), rgba(255,255,255,0.08));
    }

    .wax {
      position: absolute;
      top: 75%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 140px;
      z-index: 5;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .wax-img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }

    .hint {
      position: absolute;
      bottom: -30px;
      width: 100%;
      text-align: center;
      font-size: 16px;
      font-weight: 1000;    
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(212, 175, 55, 0.675);
      transition: opacity 0.5s;
      z-index: 20;
    }
    .scene.open .hint { opacity: 0; pointer-events: none; }

    /*LETTER*/
    .letter {
      position: absolute;
      bottom: 0;
      left: 5%;
      width: 90%;
      height: 0;
      z-index: 2;
      background: #fffcf5;
      border-radius: 3px;
      overflow: hidden;
      transition:
        height 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.3s,
        transform 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.3s,
        box-shadow 1.2s ease 0.3s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 27px, rgba(180,150,100,0.08) 28px
      );
    }

    .letter-inner {
      padding: 28px 24px 24px;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s ease 1.2s, transform 0.8s ease 1.2s;
      position: relative;
    }

    .letter-inner::before,
    .letter-inner::after {
      content: "✦";
      position: absolute;
      font-size: 10px;
      color: rgba(180,140,60,0.4);
    }
    .letter-inner::before { top: 12px; left: 12px; }
    .letter-inner::after  { top: 12px; right: 12px; }

    .letter-divider {
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,140,60,0.4), transparent);
      margin: 8px auto;
    }

    .letter-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(140,100,60,0.7);
      font-weight: 300;
    }

    .letter-names {
      font-family: 'Great Vibes', cursive;
      font-size: 50px;
      color: #6a1828;
      line-height: 1.1;
      margin: 2px 0;
      text-shadow: 0 2px 8px rgba(100,20,40,0.15);
    }

    .letter-ampersand {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 26px;
      color: rgba(180,140,60,0.7);
      display: block;
      margin: -2px 0 8px;
    }

    .letter-body {
      font-size: 13px;
      line-height: 1.7;
      color: #5a3e2e;
      font-weight: 300;
      margin-top: 6px;
    }

    .letter-detail {
      margin-top: 12px;
      font-size: 12px;
      letter-spacing: 1px;
      line-height: 2;
      color: #4a3020;
    }

    .letter-detail strong {
      font-weight: 400;
      color: #6a1828;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 10px;
    }

    .letter-footer {
      margin-top: 12px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 12px;
      color: rgba(140,100,60,0.7);
    }

    /* === OPEN STATE === */
    .scene.open .flap {
      transform: rotateX(-180deg);
      z-index: 0;
    }

    .scene.open .wax {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.8);
    }

    .scene.open .letter {
      height: 420px;
      transform: translateY(-50px);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.8),
        0 10px 30px rgba(0,0,0,0.5);
      z-index: 6;
    }

    .scene.open .letter-inner {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="scene" id="scene" onclick="toggle()">
  <div class="envelope-wrap">
    <div class="envelope-body">
      <div class="fold-left"></div>
      <div class="fold-right"></div>
    </div>

    <div class="flap">
      <div class="flap-front"></div>
      <div class="flap-back"></div>
    </div>

    <div class="wax">
      <img class="wax-img" src="wax.png" alt="Wax seal">
    </div>

    <div class="letter">
      <div class="letter-inner">
        <div class="letter-eyebrow">Together with their families</div>
        <div class="letter-divider"></div>
        <div class="letter-names">
          Sarah
          <span class="letter-ampersand">&</span>
          Zeid
        </div>
        <div class="letter-divider"></div>
        <p class="letter-body">
          joyfully invite you to celebrate<br>
          the beginning of their
        </p>
        <div class="letter-detail">
          <strong>Date</strong><br>
          June 12, 2026<br><br>
          <strong>Venue</strong><br>
          Goda Rum, Kumlas Naturenshus, Sverige
        </div>
        <div class="letter-divider" style="margin-top:12px;"></div>
        <div class="letter-footer">Dinner · Dancing · Love</div>
      </div>
    </div>
  </div>

  <div class="hint">— tap to open —</div>
</div>

<script>
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 14 + 10}s;
      animation-delay: ${Math.random() * -20}s;
      opacity: ${Math.random() * 0.6 + 0.2};
    `;
    container.appendChild(p);
  }

  function toggle() {
    document.getElementById('scene').classList.toggle('open');
  }
</script>
</body>
</html>
